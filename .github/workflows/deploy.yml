name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]  # メインブランチにプッシュされた時に実行

  # 手動実行も可能にする（テスト用）
  workflow_dispatch:

# GitHub Pagesへのデプロイに必要な権限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に複数のデプロイが走らないように制御
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # npm installを高速化

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ビルド結果が出力されるディレクトリを指定
          # Viteなどの場合は './dist'、Next.js(SSG)の場合は './out'
          path: './dist'

  deploy:
    # ビルドジョブが完了してから実行
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4